<div class="max-w-lg">

  <div class="mb-8">
    <h2 class="text-xl font-black text-white mb-1">Novo Fornecedor</h2>
    <p class="text-sm text-blue-200/50">Preencha os dados para cadastrar um fornecedor.</p>
  </div>

  <div [formGroup]="supplierForm" class="bg-white/5 border border-white/10 rounded-2xl p-8 space-y-5">

    <div>
      <label class="block text-sm font-medium text-blue-100 mb-2">Nome *</label>
      <input
        formControlName="nome"
        type="text"
        placeholder="Ex: Transportes Brasil Ltda."
        class="w-full bg-white/10 border rounded-xl px-4 py-3 text-white placeholder-blue-300/30 outline-none transition text-sm"
        [class.border-white/20]="!isInvalid('nome')"
        [class.border-red-400]="isInvalid('nome')"
      />
      <p *ngIf="isInvalid('nome')" class="text-red-400 text-xs mt-1">Nome é obrigatório.</p>
    </div>

    <div>
      <label class="block text-sm font-medium text-blue-100 mb-2">CNPJ *</label>
      <input
        formControlName="cnpj"
        type="text"
        placeholder="00.000.000/0000-00"
        maxlength="18"
        (input)="maskCnpj($event)"
        class="w-full bg-white/10 border rounded-xl px-4 py-3 text-white placeholder-blue-300/30 outline-none transition text-sm font-mono"
        [class.border-white/20]="!isInvalid('cnpj')"
        [class.border-red-400]="isInvalid('cnpj')"
      />
      <p *ngIf="isInvalid('cnpj')" class="text-red-400 text-xs mt-1">CNPJ inválido.</p>
    </div>

    <div class="flex gap-3 pt-2">
      <a routerLink="/dashboard" class="flex-1">
        <button type="button"
          class="w-full border border-white/20 text-white px-6 py-3 rounded-xl hover:bg-white/10 transition text-sm font-medium">
          Cancelar
        </button>
      </a>
      <button
        (click)="onSubmit()"
        [disabled]="submitting"
        class="flex-1 bg-blue-400 hover:bg-blue-300 disabled:opacity-50 disabled:cursor-not-allowed text-[#0D3C68] font-bold px-6 py-3 rounded-xl transition text-sm flex items-center justify-center gap-2">
        <span *ngIf="submitting" class="material-icons text-base animate-spin">refresh</span>
        {{ submitting ? 'Salvando...' : 'Cadastrar' }}
      </button>
    </div>

  </div>

</div>
