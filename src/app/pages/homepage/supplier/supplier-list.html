<div class="space-y-6">

  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-xl font-black text-white mb-1">Fornecedores</h2>
      <p class="text-sm text-blue-200/50">{{ filteredSuppliers.length }} fornecedores cadastrados</p>
    </div>
    <a routerLink="/dashboard/suppliers/new">
      <button class="bg-blue-400 hover:bg-blue-300 text-[#0D3C68] font-bold text-sm px-5 py-2.5 rounded-xl transition flex items-center gap-2">
        <span class="material-icons text-base">add</span>
        Novo Fornecedor
      </button>
    </a>
  </div>

  <div class="relative max-w-sm">
    <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-blue-300/40 text-lg">search</span>
    <input
      [(ngModel)]="searchQuery"
      (input)="applyFilter()"
      type="text"
      placeholder="Buscar por nome ou CNPJ..."
      class="w-full bg-white/5 border border-white/10 focus:border-blue-400/50 rounded-xl pl-10 pr-4 py-2.5 text-white placeholder-blue-300/30 outline-none text-sm transition"
    />
  </div>

  <div class="bg-white/5 border border-white/10 rounded-2xl overflow-hidden">

    <div class="grid grid-cols-12 px-6 py-3 border-b border-white/10 text-xs uppercase tracking-widest text-blue-200/40 font-semibold">
      <div class="col-span-1">#</div>
      <div class="col-span-5">Nome</div>
      <div class="col-span-4">CNPJ</div>
      <div class="col-span-2 text-right">Ações</div>
    </div>

    <div
      *ngFor="let supplier of filteredSuppliers; let i = index; let last = last"
      class="grid grid-cols-12 px-6 py-4 items-center hover:bg-white/5 transition"
      [class.border-b]="!last"
      [class.border-white/5]="!last">

      <div class="col-span-1 text-sm text-blue-200/30 font-mono">{{ i + 1 }}</div>

      <div class="col-span-5 flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs font-black shrink-0"
          [style.background]="supplier.color + '22'"
          [style.color]="supplier.color">
          {{ supplier.initials }}
        </div>
        <span class="text-sm font-medium text-white truncate">{{ supplier.nome }}</span>
      </div>

      <div class="col-span-4 text-sm text-blue-200/60 font-mono">{{ supplier.cnpj }}</div>

      <div class="col-span-2 flex justify-end gap-2">
        <button
          class="w-8 h-8 rounded-lg bg-white/5 hover:bg-blue-500/20 border border-white/10 hover:border-blue-400/30 flex items-center justify-center transition"
          title="Editar">
          <span class="material-icons text-sm text-blue-200/60">edit</span>
        </button>
        <button
          (click)="delete(supplier)"
          class="w-8 h-8 rounded-lg bg-white/5 hover:bg-red-500/20 border border-white/10 hover:border-red-400/30 flex items-center justify-center transition"
          title="Remover">
          <span class="material-icons text-sm text-red-300/60">delete</span>
        </button>
      </div>

    </div>

    <div *ngIf="filteredSuppliers.length === 0" class="py-16 text-center">
      <span class="material-icons text-4xl text-blue-300/20 mb-3 block">business_center</span>
      <p class="text-blue-200/40 text-sm">Nenhum fornecedor encontrado.</p>
      <a routerLink="/dashboard/suppliers/new"
        class="inline-block mt-3 text-blue-400 hover:text-blue-300 text-sm transition">
        Cadastrar primeiro fornecedor →
      </a>
    </div>

  </div>

</div>
