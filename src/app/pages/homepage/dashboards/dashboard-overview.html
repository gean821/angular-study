<div class="space-y-6">

  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
    <div *ngFor="let stat of stats"
      class="bg-white/5 border border-white/10 rounded-2xl p-5 hover:bg-white/[0.07] transition">
      <div class="flex items-start justify-between mb-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center"
          [style.background]="stat.color + '22'"
          [style.border]="'1px solid ' + stat.color + '44'">
          <span class="material-icons text-base" [style.color]="stat.color">{{ stat.icon }}</span>
        </div>
        <span class="text-xs font-semibold px-2 py-0.5 rounded-full"
          [class.text-green-300]="stat.trend > 0"
          [class.bg-green-500/10]="stat.trend > 0"
          [class.text-red-300]="stat.trend < 0"
          [class.bg-red-500/10]="stat.trend < 0">
          {{ stat.trend > 0 ? '+' : '' }}{{ stat.trend }}%
        </span>
      </div>
      <div class="text-2xl font-black text-white mb-1">{{ stat.value }}</div>
      <div class="text-xs text-blue-200/50">{{ stat.label }}</div>
    </div>
  </div>

  <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
    <h2 class="font-bold text-white mb-4">Ações Rápidas</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <a routerLink="/dashboard/suppliers/new"
        class="flex flex-col items-center gap-2 bg-white/5 hover:bg-blue-500/10 border border-white/10 hover:border-blue-400/30 rounded-xl p-4 transition group cursor-pointer">
        <span class="material-icons text-2xl text-blue-300/60 group-hover:text-blue-300">business</span>
        <span class="text-xs text-blue-200/60 group-hover:text-white transition text-center">Novo Fornecedor</span>
      </a>
      <a routerLink="/dashboard/drivers"
        class="flex flex-col items-center gap-2 bg-white/5 hover:bg-blue-500/10 border border-white/10 hover:border-blue-400/30 rounded-xl p-4 transition group cursor-pointer">
        <span class="material-icons text-2xl text-blue-300/60 group-hover:text-blue-300">person_add</span>
        <span class="text-xs text-blue-200/60 group-hover:text-white transition text-center">Novo Motorista</span>
      </a>
      <a routerLink="/dashboard/schedule"
        class="flex flex-col items-center gap-2 bg-white/5 hover:bg-blue-500/10 border border-white/10 hover:border-blue-400/30 rounded-xl p-4 transition group cursor-pointer">
        <span class="material-icons text-2xl text-blue-300/60 group-hover:text-blue-300">add_circle</span>
        <span class="text-xs text-blue-200/60 group-hover:text-white transition text-center">Novo Agendamento</span>
      </a>
      <a routerLink="/dashboard/reports"
        class="flex flex-col items-center gap-2 bg-white/5 hover:bg-blue-500/10 border border-white/10 hover:border-blue-400/30 rounded-xl p-4 transition group cursor-pointer">
        <span class="material-icons text-2xl text-blue-300/60 group-hover:text-blue-300">download</span>
        <span class="text-xs text-blue-200/60 group-hover:text-white transition text-center">Exportar Relatório</span>
      </a>
    </div>
  </div>

</div>
